<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZEONS City 2048 - 도시 만들기 게임</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts: Inter & Outfit -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Outfit:wght@300;600;800&display=swap"
        rel="stylesheet">

    <link rel="icon" type="image/png" sizes="64x64" href="/favicon.png">

    <!-- manifest.json 지원용 -->
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icons/icon-180x180.png">
    <meta name="theme-color" content="#ffffff">

</head>

<body>
    <div class="game-container">
        <div id="weather-container" class="weather-container"></div>
        <div class="sky-background">
            <div class="zeppelin">
                <div class="zeppelin-content">
                    <span class="zeppelin-logo">ZEONS</span>
                </div>
            </div>
        </div>

        <header>
            <div class="title-section">
                <h1 class="logo">ZEONS CITY <span>2048</span></h1>
                <p class="subtitle">나만의 도시를 건설하세요</p>
            </div>
            <div class="scores-container">
                <div class="score-box">
                    <div class="label">SCORE</div>
                    <div id="score">0</div>
                </div>
                <div class="score-box highlight">
                    <svg class="crown-icon" viewBox="0 0 24 24" width="24" height="24">
                        <path fill="currentColor"
                            d="M5 16L3 5L8.5 10L12 4L15.5 10L21 5L19 16H5M19 19C19 19.55 18.55 20 18 20H6C5.45 20 5 19.55 5 19V18H19V19Z" />
                    </svg>
                    <div class="label">BEST</div>
                    <div id="best-score">0</div>
                </div>
            </div>
        </header>

        <div class="game-intro">
            <button id="restart-button" data-tooltip="새로운 도시 건설">
                <svg viewBox="0 0 24 24" width="20" height="20">
                    <path fill="currentColor"
                        d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z" />
                </svg>
            </button>
            <div class="controls-container">
                <div class="level-badge" id="current-level">LV.1</div>
                <div class="tooltip-wrapper" data-tooltip="조커 건물 (3콤버 이상 생성)">
                    <button id="joker-button" class="control-btn gold" disabled>
                        <div class="joker-btn-img"></div>
                        <span id="joker-count" class="count-badge">0</span>
                    </button>
                </div>
                <button id="value-toggle" class="control-btn" data-tooltip="숫자 표시 켜기/끄기">
                    <svg viewBox="0 0 24 24" width="20" height="20">
                        <path fill="currentColor"
                            d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z" />
                    </svg>
                </button>
                <button id="bgm-toggle" class="control-btn" data-tooltip="BGM 켜기/끄기">
                    <svg id="sound-on" viewBox="0 0 24 24" width="20" height="20">
                        <path fill="currentColor"
                            d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z" />
                    </svg>
                    <svg id="sound-off" class="hidden" viewBox="0 0 24 24" width="20" height="20">
                        <path fill="currentColor"
                            d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73 4.27 3zM12 4L9.91 6.09 12 8.18V4z" />
                    </svg>
                </button>
                <button id="share-button" class="control-btn" data-tooltip="공유하기">
                    <svg viewBox="0 0 24 24" width="20" height="20">
                        <path fill="currentColor"
                            d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92c0-1.61-1.31-2.92-2.92-2.92zM18 4c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zM6 13c-.55 0-1-.45-1-1s.45-1-1-1 1 .45 1 1-.45 1-1 1zm12 7.02c-.55 0-1-.45-1-1s.45-1-1-1 1 .45 1 1-.45 1-1 1z" />
                    </svg>
                </button>
            </div>
        </div>

        <div class="event-message-container" id="event-message-container"></div>

        <div class="game-board-wrapper">
            <div id="game-board" class="game-board">
                <!-- GRID BACKGROUND -->
                <div class="grid-container">
                    <div class="grid-cell"></div>
                    <div class="grid-cell"></div>
                    <div class="grid-cell"></div>
                    <div class="grid-cell"></div>
                    <div class="grid-cell"></div>
                    <div class="grid-cell"></div>
                    <div class="grid-cell"></div>
                    <div class="grid-cell"></div>
                    <div class="grid-cell"></div>
                    <div class="grid-cell"></div>
                    <div class="grid-cell"></div>
                    <div class="grid-cell"></div>
                    <div class="grid-cell"></div>
                    <div class="grid-cell"></div>
                    <div class="grid-cell"></div>
                    <div class="grid-cell"></div>
                </div>
                <!-- TILES LAYER -->
                <div id="tile-container" class="tile-container"></div>
            </div>
        </div>

        <footer class="game-info">
            <div id="bgm-info" class="bgm-info">
                <svg viewBox="0 0 24 24" width="16" height="16">
                    <path fill="currentColor"
                        d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z" />
                </svg>
                <span id="bgm-track-name">BGM: Loading...</span>
            </div>
            <p><strong>조작 방법:</strong> 방향키나 스와이프를 사용하여 타일을 이동하세요.</p>
            <p>같은 건물이 합쳐지면 더 크고 세련된 건물로 <strong>진화</strong>합니다!</p>
            <p><strong>조커 빌딩을 획득하고 도시를 더 빠르게 성장시켜 보세요.</strong></p>
        </footer>
    </div>

    <!-- 오버레이: 게임 오버/승리 -->
    <div id="game-message" class="game-message">
        <div class="message-content">
            <h2 id="status-title">GAME OVER</h2>
            <p id="status-desc">도시 건설에 실패했습니다.</p>
            <div class="final-score">SCORE: <span id="final-score-val">0</span></div>
            <div class="message-buttons">
                <button id="retry-button">
                    <svg viewBox="0 0 24 24" width="20" height="20">
                        <path fill="currentColor"
                            d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z" />
                    </svg>
                    다시 시작
                </button>
                <button id="share-final-button">
                    <svg viewBox="0 0 24 24" width="20" height="20">
                        <path fill="currentColor"
                            d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92c0-1.61-1.31-2.92-2.92-2.92zM18 4c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zM6 13c-.55 0-1-.45-1-1s.45-1-1-1 1 .45 1 1-.45 1-1 1zm12 7.02c-.55 0-1-.45-1-1s.45-1-1-1 1 .45 1 1-.45 1-1 1z" />
                    </svg>
                    결과 공유
                </button>
            </div>
        </div>
    </div>

    <!-- 배경음악 (사용자 상호작용 후 재생) -->
    <audio id="bgm" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
